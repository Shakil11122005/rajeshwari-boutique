services:
  - type: web
    name: rajeshwari-boutique
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false   # Set this manually in Render dashboard (MongoDB Atlas URI)
      - key: JWT_SECRET
        generateValue: true  # Render auto-generates a secure random value
      - key: ADMIN_PASSWORD
        sync: false   # Set this manually in Render dashboard
